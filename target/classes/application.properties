# ============================================
# ? NETPELIS - CONFIGURACIï¿½N PRINCIPAL
# ============================================
spring.application.name=NetPelis

# ============================================
# ?? CONEXIï¿½N A MYSQL
# ============================================
spring.datasource.url=jdbc:mysql://localhost:3306/netpelis?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=juandavid.15

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================
# ? JPA / HIBERNATE
# ============================================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# ? CORRECCIï¿½N: Eliminar dialecto explï¿½cito (Spring Boot 3.3+ lo detecta automï¿½tico)
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ============================================
# ? THYMELEAF - PLANTILLAS HTML
# ============================================
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
# ? CORRECCIï¿½N CRï¿½TICA: HTML5 NO existe en Thymeleaf 3.1+
# Valores vï¿½lidos: HTML, XML, TEXT, JAVASCRIPT, CSS, RAW
spring.thymeleaf.mode=HTML

# ============================================
# ? CONFIGURACIï¿½N DE ARCHIVOS / UPLOADS
# ============================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB

# ============================================
# ?? RUTAS PARA IMï¿½GENES DE PELï¿½CULAS
# ============================================
# ?? AJUSTA ESTA RUTA SEGï¿½N TU SISTEMA OPERATIVO:

# ? WINDOWS (usa forward slashes o dobles backslashes):
app.upload.path=C:/NetPelis/uploads/posters/

# ? LINUX / MAC:
# app.upload.path=/home/usuario/netpelis/uploads/posters/

# ? RUTA RELATIVA (para pruebas):
# app.upload.path=./uploads/posters/

# URL pï¿½blica para acceder a las imï¿½genes desde el navegador
app.upload.url=/uploads/posters/

# ============================================
# ? SERVIDOR WEB
# ============================================
server.port=8080

# ============================================
# ? LOGGING
# ============================================
logging.level.root=INFO
logging.level.com.NetPelis=DEBUG
logging.level.org.springframework.web=INFO