<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎟️ Mi Espacio - NetPelis</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: #0f172a; color: #e2e8f0; min-height: 100vh; }
        .navbar-netpelis {
            background: rgba(30, 41, 59, 0.95);
            border-bottom: 1px solid rgba(245, 158, 11, 0.2);
            padding: 1rem 2rem;
        }
        .movie-card {
            background: rgba(30, 41, 59, 0.9);
            border: 1px solid rgba(245, 158, 11, 0.2);
            border-radius: 16px;
            transition: all 0.3s ease;
        }
        .movie-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 25px 50px -12px rgba(245, 158, 11, 0.3);
        }
        .btn-favorite {
            background: transparent;
            border: 2px solid rgba(245, 158, 11, 0.5);
            color: #f59e0b;
            border-radius: 50px;
        }
        .btn-favorite:hover, .btn-favorite.active {
            background: #f59e0b;
            color: #0f172a;
        }
    </style>
</head>
<body>
<nav class="navbar-netpelis d-flex justify-content-between align-items-center">
    <h3 class="text-white mb-0">🎬 NetPelis</h3>
    <div class="d-flex gap-3">
        <a href="#" class="nav-link text-white">Inicio</a>
        <a href="#" class="nav-link text-white">Favoritos</a>
        <form th:action="@{/cerrar-sesion}" method="post" class="d-inline">
            <button type="submit" class="btn btn-outline-light btn-sm">
                <i class="bi bi-box-arrow-left me-2"></i>Salir
            </button>
        </form>
    </div>
</nav>

<main class="container py-4">
    <div class="alert alert-info" style="background: rgba(245,158,11,0.1); border-color: rgba(245,158,11,0.3);">
        <h4>¡Bienvenido! 👋</h4>
        <p class="mb-0">Descubre y guarda tus películas favoritas.</p>
    </div>

    <h4 class="mb-4 mt-4">🔥 Tendencias</h4>
    <div class="row g-4">
        <div class="col-6 col-md-4 col-lg-3">
            <div class="movie-card p-3">
                <div class="bg-secondary rounded mb-3" style="height: 200px; display: flex; align-items: center; justify-content: center; font-size: 3rem;">🎬</div>
                <h6 class="fw-bold">El Origen</h6>
                <small class="text-muted">2010 • Ciencia Ficción</small>
                <div class="d-flex justify-content-between align-items-center mt-3">
                    <span class="text-warning"><i class="bi bi-star-fill"></i> 4.8</span>
                    <button class="btn btn-favorite btn-sm"><i class="bi bi-heart"></i></button>
                </div>
            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
