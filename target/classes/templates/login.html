<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎬 NetPelis - Iniciar Sesión</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #312e81 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: rgba(30, 41, 59, 0.95);
            border: 1px solid rgba(59, 130, 246, 0.3);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.75);
            max-width: 450px;
            width: 100%;
            padding: 2.5rem;
        }
        .logo-netpelis {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(90deg, #f59e0b, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .form-control {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(59, 130, 246, 0.3);
            color: #fff;
            padding: 0.85rem 1rem;
            border-radius: 12px;
        }
        .form-control:focus {
            background: rgba(15, 23, 42, 1);
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.25);
            color: #fff;
        }
        .btn-netpelis {
            background: linear-gradient(90deg, #3b82f6, #6366f1);
            border: none;
            padding: 0.85rem;
            border-radius: 12px;
            font-weight: 600;
            width: 100%;
        }
        .btn-netpelis:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(59, 130, 246, 0.5);
        }
    </style>
</head>
<body>
<div class="container">
    <div class="login-card" data-aos="zoom-in">
        <div class="text-center mb-4">
            <div class="fs-1 mb-3">🎬</div>
            <h1 class="logo-netpelis">NetPelis</h1>
            <p class="text-muted">Tu plataforma de películas favoritas</p>
        </div>

        <div th:if="${param.error}" class="alert alert-danger mb-3">
            <i class="bi bi-exclamation-triangle-fill me-2"></i>
            Credenciales incorrectas
        </div>

        <div th:if="${param.logout}" class="alert alert-success mb-3">
            <i class="bi bi-check-circle-fill me-2"></i>
            Sesión cerrada correctamente
        </div>

        <form th:action="@{/procesar-login}" method="post">
            <div class="mb-3">
                <label class="form-label text-white-50">
                    <i class="bi bi-envelope-fill me-2"></i>Correo electrónico
                </label>
                <input type="email" class="form-control" name="email"
                       placeholder="ejemplo@netpelis.com" required autofocus>
            </div>

            <div class="mb-4">
                <label class="form-label text-white-50">
                    <i class="bi bi-lock-fill me-2"></i>Contraseña
                </label>
                <input type="password" class="form-control" name="contrasena"
                       placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn btn-netpelis text-white">
                <i class="bi bi-box-arrow-in-right me-2"></i>Ingresar
            </button>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script>AOS.init({ once: true });</script>
</body>
</html>
